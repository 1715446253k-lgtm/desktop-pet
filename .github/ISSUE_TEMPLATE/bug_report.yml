name: Bug report
description: Report a MiraPet runtime or pet package issue
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: MiraPet version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Runtime
        - Pet import
        - Pet package builder
        - Installer
        - Startup/tray
        - Documentation
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open MiraPet
        2. Import ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Diagnostics
      description: Paste relevant diagnostics. Do not include private customer images.
